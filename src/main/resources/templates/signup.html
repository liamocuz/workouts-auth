<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <title>Sign Up</title>
    <meta charset="UTF-8"/>
</head>
<body>
<div th:replace="~{fragments/header :: nav}"></div>

<h1>Sign Up</h1>
<form th:action="@{/signup}" th:object="${createUserRequestDTO}" method="post">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    <!-- Show global (non-field) errors, if any -->
    <div th:if="${#fields.hasGlobalErrors()}">
        <p th:each="err : ${#fields.globalErrors()}" th:text="${err}"></p>
    </div>
    <div>
        <label for="email">Email:</label>
        <input type="email" th:field="*{email}" id="email" required/>
        <div th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
    </div>
    <div>
        <label for="givenName">First Name:</label>
        <input type="text" th:field="*{givenName}" id="givenName" required/>
        <div th:if="${#fields.hasErrors('givenName')}" th:errors="*{givenName}"></div>
    </div>
    <div>
        <label for="familyName">Last Name:</label>
        <input type="text" th:field="*{familyName}" id="familyName" required/>
        <div th:if="${#fields.hasErrors('familyName')}" th:errors="*{familyName}"></div>
    </div>
    <div>
        <label for="password">Password:</label>
        <input type="password" th:field="*{password}" id="password" required minlength="8"/>
        <div th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
    </div>
    <div>
        <label for="confirmPassword">Confirm Password:</label>
        <input type="password" th:field="*{confirmPassword}" id="confirmPassword" required minlength="8"/>
        <div th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
    </div>
    <div>
        <button type="submit">Sign Up</button>
    </div>
</form>
</body>
</html>
