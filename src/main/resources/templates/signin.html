<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign In</title>
</head>
<body>
<div th:replace="~{fragments/header :: nav}"></div>

<h2>Sign In</h2>
<form th:action="@{/login}" method="post">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    <div class="field">
        <label for="email">Email:</label>
        <input type="text" id="email" name="email" autocomplete="email" required>
    </div>
    <div class="field">
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required>
    </div>
    <br>
    <button type="submit">Sign In</button>
</form>
<div>
    <form th:action="@{/oauth2/authorization/google}" method="get">
        <button type="submit">Sign in with Google</button>
    </form>
</div>
<div>
    <form th:action="@{/oauth2/authorization/facebook}" method="get">
        <button type="submit">Sign in with Facebook</button>
    </form>
</div>
<div>
    <a th:href="@{/signup}">Create a Local Account</a>
</div>
<div>
    <a th:href="@{/resend-verification}">Haven't verified your email? Resend verification email</a>
</div>

<!-- Display error message if login fails -->
<div th:if="${param.error}">
    <p style="color:red;">Invalid email or password.</p>
</div>
<!-- Display message if coming from successful registration -->
<div th:if="${param.message}">
    <p style="color:green;" th:text="${param.message}"></p>
</div>
<div th:if="${message}">
    <p style="color:green;" th:text="${message}"></p>
</div>
</body>
</html>
